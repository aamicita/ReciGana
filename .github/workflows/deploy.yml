name: Deploy ReciGana to AWS

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create deployment package
        run: |
          cd backend
          zip -r ../recigana-backend.zip . -x "venv/*" -x "__pycache__/*" -x ".env"

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: recigana
          environment_name: recigana-env
          version_label: "v-${{ github.run_number }}"
          region: us-east-2
          deployment_package: recigana-backend.zip 